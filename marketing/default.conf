server {
    listen       3000;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # small static site — compress text assets (text/html is always gzipped by nginx)
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/css application/javascript image/svg+xml application/json;
}
