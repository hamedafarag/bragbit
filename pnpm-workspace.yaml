ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

# Force patched versions of transitive deps flagged by the osv-scanner CI gate.
# Most are build/dev-tooling paths; sharp is the exception — it ships in the
# production image (image optimization), so its bump is a real runtime fix. The
# esbuild advisory under drizzle-kit's deprecated @esbuild-kit chain can't be
# patched without breaking the migration CLI, so it's filtered in
# osv-scanner.toml for an upstream drizzle-kit bump instead.
overrides:
  postcss: "^8.5.10"
  js-yaml: "^4.3.0"
  "brace-expansion@1": "^1.1.16"
  "brace-expansion@5": "^5.0.7"
  fast-uri: "^3.1.4"
  linkify-it: "^5.0.2"
  sharp: "^0.35.2"
