# Local development stack for BragBit — Postgres + MinIO + Mailpit.
#   pnpm dev:up     start (detached)
#   pnpm dev:down   stop
# The app points at these via .env (see .env.example for the matching values).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bragbit
      POSTGRES_PASSWORD: bragbit
      POSTGRES_DB: bragbit
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bragbit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bragbit -d bragbit"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - bragbit_minio:/data

  # one-shot: wait for MinIO, then create the bragbit bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc ready local &&
      mc mb --ignore-existing local/bragbit &&
      echo 'minio bucket ready';
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    environment:
      MP_MAX_MESSAGES: "500"

volumes:
  bragbit_pgdata:
  bragbit_minio:
