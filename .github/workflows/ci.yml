name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Production-dependency advisories only; accepted dev-tool advisories are
      # allowlisted in package.json (pnpm.auditConfig.ignoreGhsas).
      - run: pnpm audit --prod
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm lint:md
      - run: pnpm test
      - run: pnpm build
        env:
          DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-0123456789abcdef
      - run: pnpm size

  storage:
    name: storage adapter (minio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Reuse the dev stack's MinIO + its one-shot bucket init (creates `bragbit`).
      - name: Start MinIO and create the bucket
        run: |
          docker compose -f docker-compose.dev.yml up -d minio
          docker compose -f docker-compose.dev.yml run --rm minio-init
      # Setting S3_* un-skips the integration test (it's skipped in `verify`).
      - name: S3Storage adapter test (against MinIO)
        run: pnpm test src/lib/storage/s3.test.ts
        env:
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_BUCKET: bragbit
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin

  database:
    name: dal integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-dal-placeholder-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      # DATABASE_URL un-skips the DB-gated tests (skipped in `verify`), so this is
      # the run where the most logic executes — hence where we measure coverage.
      # `test:coverage` enforces the ratchet thresholds in vitest.config.ts and
      # fails the build on any regression. A new integration test needs no CI
      # change (the whole suite runs here automatically).
      - name: DB-gated integration tests + coverage (against Postgres)
        run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # The invitation accept e2e drives the real Better Auth sign-up, which sends
      # a verification email — Mailpit is a throwaway SMTP sink so that succeeds.
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-e2e-placeholder-secret-0123456789abcdef
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_FROM: BragBit <no-reply@bragbit.local>
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:migrate
      - run: pnpm test:e2e
      # First-run setup wizard, both private modes, against an isolated empty DB
      # (its own `next dev` per mode, run sequentially after the main e2e above).
      - name: Setup-wizard e2e (both private modes)
        run: pnpm test:e2e:setup
        env:
          SETUP_DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit_e2e_setup

  lighthouse:
    name: lighthouse (web vitals)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-lh-placeholder-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm build
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json

  links:
    name: docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress README.md 'docs/**/*.md'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
