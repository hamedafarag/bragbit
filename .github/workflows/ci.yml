name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Dependency advisories (ENH-SEC-04). Was `pnpm audit --prod`, which npm
      # broke by retiring the registry audit endpoints it calls — it now fails
      # with a 410 on every branch, and pnpm hasn't migrated to the bulk endpoint
      # (reproduced on 10.30.3 and 11.13.1). `npm audit` can't stand in: it needs
      # a package-lock.json, which a pnpm repo doesn't have. osv-scanner reads
      # pnpm-lock.yaml, i.e. the actually-resolved tree. Accepted advisories are
      # listed with their reasons in osv-scanner.toml; it exits non-zero on
      # anything else. Pinned so a new advisory, not a new scanner, is what
      # changes the result.
      - name: Dependency advisories (osv-scanner)
        run: |
          docker run --rm -v "$PWD:/src" ghcr.io/google/osv-scanner:v2.4.0 \
            scan source --lockfile=/src/pnpm-lock.yaml --config=/src/osv-scanner.toml
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm lint:md
      - run: pnpm test
      - run: pnpm build
        env:
          DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-0123456789abcdef
      - run: pnpm size

  storage:
    name: storage adapter (minio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Reuse the dev stack's MinIO + its one-shot bucket init (creates `bragbit`).
      - name: Start MinIO and create the bucket
        run: |
          docker compose -f docker-compose.dev.yml up -d minio
          docker compose -f docker-compose.dev.yml run --rm minio-init
      # Setting S3_* un-skips the integration test (it's skipped in `verify`).
      - name: S3Storage adapter test (against MinIO)
        run: pnpm test src/lib/storage/s3.test.ts
        env:
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_BUCKET: bragbit
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin

  database:
    name: dal integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-dal-placeholder-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      # DATABASE_URL un-skips the DB-gated tests (skipped in `verify`), so this is
      # the run where the most logic executes — hence where we measure coverage.
      # `test:coverage` enforces the ratchet thresholds in vitest.config.ts and
      # fails the build on any regression. A new integration test needs no CI
      # change (the whole suite runs here automatically).
      - name: DB-gated integration tests + coverage (against Postgres)
        run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # The invitation accept e2e drives the real Better Auth sign-up, which sends
      # a verification email — Mailpit is a throwaway SMTP sink so that succeeds.
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-e2e-placeholder-secret-0123456789abcdef
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_FROM: BragBit <no-reply@bragbit.local>
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:migrate
      - run: pnpm test:e2e
      # First-run setup wizard, both private modes, against an isolated empty DB
      # (its own `next dev` per mode, run sequentially after the main e2e above).
      - name: Setup-wizard e2e (both private modes)
        run: pnpm test:e2e:setup
        env:
          SETUP_DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit_e2e_setup
      # Hosted multi-tenant mode (open signup → personal workspace): its own
      # `next dev` in INSTANCE_MODE=hosted against an isolated DB (globalSetup
      # creates + migrates it). Reuses the Mailpit sink for the verification email.
      - name: Hosted-mode e2e (open signup)
        run: pnpm test:e2e:hosted
        env:
          HOSTED_DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit_e2e_hosted

  lighthouse:
    name: lighthouse (web vitals)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-lh-placeholder-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm build
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json

  links:
    name: docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress README.md 'docs/**/*.md'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-image:
    name: docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Smoke-build the production image so a Dockerfile break (e.g. a base-image
      # bump that drops a bundled tool, as node:26-alpine did with corepack) fails
      # CI instead of only surfacing at deploy time. The builder stage inlines
      # placeholder secrets and opens no DB connection, so this needs no services.
      - name: Build the production image
        run: docker build -t bragbit:ci .
        env:
          DOCKER_BUILDKIT: "1"
