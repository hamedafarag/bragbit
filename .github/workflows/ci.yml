name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm lint:md
      - run: pnpm test
      - run: pnpm build
        env:
          DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
          BETTER_AUTH_SECRET: ci-build-placeholder-secret
      - run: pnpm size

  storage:
    name: storage adapter (minio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Reuse the dev stack's MinIO + its one-shot bucket init (creates `bragbit`).
      - name: Start MinIO and create the bucket
        run: |
          docker compose -f docker-compose.dev.yml up -d minio
          docker compose -f docker-compose.dev.yml run --rm minio-init
      # Setting S3_* un-skips the integration test (it's skipped in `verify`).
      - name: S3Storage adapter test (against MinIO)
        run: pnpm test src/lib/storage/s3.test.ts
        env:
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_BUCKET: bragbit
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-e2e-placeholder-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:migrate
      - run: pnpm test:e2e

  lighthouse:
    name: lighthouse (web vitals)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bragbit
          POSTGRES_PASSWORD: bragbit
          POSTGRES_DB: bragbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://bragbit:bragbit@localhost:5432/bragbit
      BETTER_AUTH_SECRET: ci-lh-placeholder-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm build
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json

  links:
    name: docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress README.md 'docs/**/*.md'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
